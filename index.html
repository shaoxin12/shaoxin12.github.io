<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>杨少新</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="brand">
          <span class="brand-dot"></span>
          <span class="brand-name">杨少新</span>
          <button class="lang-toggle" onclick="toggleLang()" aria-label="Switch language">
            <span data-zh>中</span>
            <span class="lang-slash">/</span>
            <span data-en>EN</span>
          </button>
        </div>
        <nav class="sidebar-nav">
          <button class="nav-item active" data-section="project" onclick="navigateToSection('project')">
            <span class="nav-zh" data-zh>项目</span>
            <span class="nav-en" data-en>Project</span>
          </button>
          <button class="nav-item" data-section="articles" onclick="navigateToSection('articles')">
            <span class="nav-zh" data-zh>文章</span>
            <span class="nav-en" data-en>Articles</span>
          </button>
        </nav>
      </div>
      <div class="sidebar-footer">
        <span class="sidebar-email">yangshaoxin12@gmail.com</span>
      </div>
    </aside>

    <main class="main" id="main-content">
      <!-- Rendered by JS -->
    </main>

    <!-- Mobile-only email footer, hidden on desktop -->
    <div class="mobile-email">
      yangshaoxin12@gmail.com
    </div>
  </div>

  <script src="content.js"></script>
  <script src="script.js"></script>
</body>
</html>
